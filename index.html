<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Diagnostic IA ŌĆö Bordeaux Technowest | eenov</title>
<style>
:root{
  --marine:#122750;--magenta:#BC2067;--bleu:#1A80C1;--vert:#66BD50;--jaune:#F1C93B;--orange:#E8833A;
  --texte:#1B2433;--gris:#5A6473;--carte:#F4F6FA;--blanc:#ffffff;--radius:22px;
  --shadow:0 24px 60px rgba(7,18,42,.35);--t:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;min-height:100%;}
body{
  font-family:Calibri,"Segoe UI",system-ui,-apple-system,sans-serif;color:var(--texte);
  background:radial-gradient(1200px 600px at 12% -10%,#1d3c74 0%,rgba(29,60,116,0) 55%),
    radial-gradient(1000px 700px at 110% 120%,#173463 0%,rgba(23,52,99,0) 50%),
    linear-gradient(160deg,#0e2148 0%,#122750 45%,#0c1c3e 100%);
  background-color:var(--marine);min-height:100dvh;display:flex;align-items:center;justify-content:center;
  padding:clamp(10px,3vw,32px);overflow-x:hidden;
}
.confetti-bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.confetti-bg i{position:absolute;display:block;width:16px;height:4px;border-radius:3px;opacity:.5;
  transform:rotate(var(--r,30deg));animation:drift var(--d,9s) var(--t) infinite alternate;}
@keyframes drift{from{transform:translateY(0) rotate(var(--r,30deg));}to{transform:translateY(22px) rotate(calc(var(--r,30deg) + 12deg));}}
.stage{position:relative;z-index:2;width:100%;max-width:680px;}
.card{position:relative;background:var(--blanc);border-radius:var(--radius);box-shadow:var(--shadow);
  overflow:hidden;display:flex;flex-direction:column;min-height:min(86dvh,720px);}
.head{display:flex;align-items:center;justify-content:flex-start;gap:12px;padding:16px 22px 10px;}
.head img.head-logo{height:60px;width:auto;display:block;}
.head img{height:30px;width:auto;display:block;}
.qualiopi{font-size:9.5px;letter-spacing:.6px;color:var(--gris);font-weight:700;text-transform:uppercase;
  text-align:right;line-height:1.25;max-width:160px;}
.qualiopi b{color:var(--bleu);}
.progress-wrap{padding:0 22px 6px;}
.progress-meta{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--gris);
  margin-bottom:6px;font-weight:600;}
.progress{height:7px;background:#e7ecf5;border-radius:99px;overflow:hidden;}
.progress > i{display:block;height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--magenta),var(--bleu),var(--vert));transition:width .5s var(--t);}
.body{flex:1;position:relative;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen{padding:8px 26px 18px;display:flex;flex-direction:column;min-height:100%;
  animation:slidein .42s var(--t);}
@keyframes slidein{from{opacity:0;transform:translateX(34px);}to{opacity:1;transform:translateX(0);}}
.illus{height:118px;margin:6px auto 4px;display:flex;align-items:center;justify-content:center;}
.illus svg{height:100%;width:auto;overflow:visible;}
.float{animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.pulse{transform-origin:center;animation:pulse 2.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
.spin-slow{transform-origin:center;animation:spin 14s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.blink{animation:blink 3.2s ease-in-out infinite;}
@keyframes blink{0%,92%,100%{opacity:1;}96%{opacity:.15;}}
.section-tag{font-family:"Trebuchet MS",sans-serif;font-size:11px;font-weight:700;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--magenta);margin:2px 0 4px;}
.q-title{font-family:"Trebuchet MS",sans-serif;font-weight:700;color:var(--marine);
  font-size:clamp(19px,4.6vw,24px);line-height:1.25;margin:0 0 4px;}
.q-help{font-size:13.5px;color:var(--gris);margin:0 0 14px;line-height:1.4;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opts.grid{display:grid;grid-template-columns:1fr 1fr;}
.opt-card{display:flex;align-items:center;gap:11px;text-align:left;width:100%;border:2px solid #e3e9f3;
  background:var(--carte);border-radius:14px;padding:13px 14px;font-size:15px;color:var(--texte);cursor:pointer;
  font-family:inherit;transition:all .18s var(--t);position:relative;}
.opt-card:hover{border-color:var(--bleu);background:#eef4fb;transform:translateY(-1px);}
.opt-card .mark{flex:0 0 auto;width:22px;height:22px;border-radius:50%;border:2px solid #c4cfe0;display:flex;
  align-items:center;justify-content:center;transition:all .18s var(--t);}
.opt-card.multi .mark{border-radius:7px;}
.opt-card .mark svg{width:13px;height:13px;opacity:0;transform:scale(.4);transition:all .18s var(--t);stroke:#fff;}
.opt-card .emoji{font-size:20px;line-height:1;}
.opt-card.selected{border-color:var(--bleu);background:#e7f1fb;box-shadow:0 4px 14px rgba(26,128,193,.18);}
.opt-card.selected .mark{background:var(--bleu);border-color:var(--bleu);}
.opt-card.selected .mark svg{opacity:1;transform:scale(1);}
.opt-card .txt{flex:1;}
.opt-card .txt small{display:block;color:var(--gris);font-size:12px;margin-top:1px;}
.scale{display:flex;gap:8px;justify-content:space-between;}
.scale .opt-card{flex-direction:column;gap:6px;justify-content:center;text-align:center;padding:12px 6px;flex:1;}
.scale .opt-card .emoji{font-size:26px;}
.scale .opt-card .txt{font-size:11.5px;line-height:1.2;}
.field{width:100%;font-family:inherit;font-size:15.5px;color:var(--texte);border:2px solid #e3e9f3;
  background:var(--carte);border-radius:14px;padding:13px 15px;transition:all .18s var(--t);resize:vertical;}
.field:focus{outline:none;border-color:var(--bleu);background:#fff;box-shadow:0 4px 14px rgba(26,128,193,.15);}
textarea.field{min-height:108px;line-height:1.45;}
.foot{display:flex;align-items:center;gap:12px;padding:14px 26px 20px;border-top:1px solid #eef1f7;background:#fff;}
.btn{font-family:"Trebuchet MS",sans-serif;font-weight:700;font-size:15px;border:none;border-radius:13px;
  padding:13px 22px;cursor:pointer;transition:all .18s var(--t);display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:var(--magenta);color:#fff;box-shadow:0 8px 20px rgba(188,32,103,.32);}
.btn-primary:hover{filter:brightness(1.07);transform:translateY(-1px);}
.btn-primary:disabled{background:#cdd5e3;color:#fff;box-shadow:none;cursor:not-allowed;transform:none;}
.btn-ghost{background:transparent;color:var(--gris);padding:13px 10px;}
.btn-ghost:hover{color:var(--marine);}
.btn-ghost:disabled{opacity:0;pointer-events:none;}
.foot .spacer{flex:1;}
.intro{align-items:center;text-align:center;justify-content:center;}
.intro .logo-full{height:74px;margin-bottom:18px;}
.intro h1{font-family:"Trebuchet MS",sans-serif;color:var(--marine);font-size:clamp(24px,6vw,32px);margin:0 0 6px;line-height:1.15;}
.intro .lead{color:var(--gris);font-size:15.5px;line-height:1.5;max-width:460px;margin:0 0 20px;}
.intro .pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px;}
.pill{display:inline-flex;align-items:center;gap:7px;background:var(--carte);border:1px solid #e3e9f3;
  border-radius:99px;padding:8px 14px;font-size:13px;color:var(--marine);font-weight:600;}
.pill .dot{width:8px;height:8px;border-radius:50%;}
.intro .btn-primary{font-size:17px;padding:15px 34px;}
.intro .privacy{font-size:12px;color:var(--gris);margin-top:16px;max-width:420px;line-height:1.45;}
.done{align-items:center;text-align:center;justify-content:center;position:relative;}
.done .check{width:96px;height:96px;margin-bottom:8px;}
.done h1{font-family:"Trebuchet MS",sans-serif;color:var(--marine);font-size:28px;margin:4px 0 8px;}
.done p{color:var(--gris);font-size:15.5px;line-height:1.5;max-width:440px;margin:0 0 8px;}
.done .status{font-size:13px;margin-top:14px;padding:9px 16px;border-radius:10px;font-weight:600;}
.done .status.ok{background:#e9f8e6;color:#2f7d22;}
.done .status.warn{background:#fef4dc;color:#a06a00;}
.done .dl{margin-top:18px;}
.celebrate{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.celebrate i{position:absolute;width:11px;height:11px;border-radius:2px;top:-20px;animation:fall var(--fd,2.6s) linear forwards;}
@keyframes fall{to{transform:translateY(540px) rotate(540deg);opacity:0;}}
.req{color:var(--magenta);}
.optional-tag{font-size:12px;color:var(--gris);font-weight:400;}
@media (max-width:520px){
  .screen{padding:6px 18px 14px;}.head,.progress-wrap{padding-left:16px;padding-right:16px;}
  .foot{padding:12px 16px 18px;}.opts.grid{grid-template-columns:1fr;}.illus{height:96px;}
  .scale .opt-card .emoji{font-size:22px;}
}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;transition-duration:.12s !important;}}
</style>
</head>
